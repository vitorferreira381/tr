<html>

<head>
    <title>Trigonlyne</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>
    <main>
        <section class="contato-tr">
            <div class="contato-tr-conteudo">
                <h1>Entre em Contato</h1>
                <p>Estamos prontos para atender você e responder suas dúvidas.</p>
            </div>
        </section>
        <section class="contato">
            <div class="contato-grid">

                <div class="info-card">

                    <div class="card-topo">
                        <div class="info-imagem">
                            <img src="imagens/zap.png" alt="WhatsApp">
                        </div>

                        <a href="https://wa.me/556130273664?text=Olá!%20Encontrei%20a%20Trigonlyne%20pelo%20site%20e%20gostaria%20de%20conhecer%20melhor%20os%20produtos%20e%20serviços.%20Poderiam%20me%20ajudar?"
                            class="acao-card" target="_blank">
                            Conversar
                        </a>
                    </div>

                    <h3>Telefone e WhatsApp</h3>
                    <p>+55 (61) 3027-3664</p>

                </div>

                <div class="info-card">

                    <div class="card-topo">
                        <div class="info-imagem">
                            <img src="imagens/local.png">
                        </div>
                        <a href="https://maps.google.com/?q=St.+N+QNN+5+B,+Ceilândia,+Brasília+-+DF" class="acao-card"
                            target="_blank">
                            Abrir mapa
                        </a>
                    </div>

                    <h3>Endereço</h3>
                    <p>St. N QNN 5 B - Ceilândia, Brasília - DF, 72225-052, Brasil</p>
                </div>

                <div class="info-card">

                    <div class="card-topo">
                        <div class="info-imagem">
                            <img src="imagens/email.png">
                        </div>
                        <a href="#" class="acao-card"
                            onclick="navigator.clipboard.writeText('trigonlyne@trigonlyne.com'); return false;">
                            Copiar e-mail
                        </a>
                    </div>

                    <h3>Email</h3>
                    <p>trigonlyne@trigonlyne.com</p>

                </div>

            </div>
        </section>

        <section class="mapa-section">
            <h2>Venha nos visitar!</h2>

            <div class="mapa-container">

                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3838.8968837012376!2d-48.114334799999995!3d-15.809390300000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x935bcc88d463d8ad%3A0xa8c251d2b9aba31c!2sUniverso%20dos%20P%C3%A3es!5e0!3m2!1spt-BR!2sbr!4v1781626595698!5m2!1spt-BR!2sbr"
                    width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>

            </div>
        </section>
    </main>
</body>

</html>
